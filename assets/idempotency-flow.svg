<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 540" width="100%">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#999" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: 'Pretendard', 'Inter', -apple-system, sans-serif; }
    .lbl { font-size: 17px; font-weight: 600; fill: #fff; }
    .sub { font-size: 14.5px; font-weight: 500; fill: rgba(255,255,255,0.92); }
    .elbl { font-size: 14px; font-weight: 500; fill: #888; }
  </style>

  <!-- ══════════════════════════════════════ -->
  <!-- 1. Request                            -->
  <!-- ══════════════════════════════════════ -->
  <rect x="40" y="215" width="130" height="80" rx="8" fill="#4CAF50"/>
  <text class="lbl" x="105" y="260" text-anchor="middle" dominant-baseline="central">Request</text>

  <!-- Arrow: Request → Cache Hit? -->
  <line x1="170" y1="255" x2="258" y2="255" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════ -->
  <!-- 2. Cache Hit? (blue diamond)          -->
  <!-- ══════════════════════════════════════ -->
  <g transform="translate(340,255)">
    <polygon points="0,-82 82,0 0,82 -82,0" fill="#2196F3" rx="8"/>
    <text class="lbl" x="0" y="-10" text-anchor="middle" dominant-baseline="central">Cache</text>
    <text class="lbl" x="0" y="14" text-anchor="middle" dominant-baseline="central">Hit?</text>
  </g>

  <!-- ── Hit path (up → right) ── -->
  <path d="M340 174 L340 110 L480 110" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <text class="elbl" x="440" y="100">Hit</text>

  <!-- 3. Return Cached Response (green) -->
  <rect x="490" y="72" width="215" height="76" rx="8" fill="#4CAF50"/>
  <text class="lbl" x="597" y="100" text-anchor="middle" dominant-baseline="central">Return</text>
  <text class="lbl" x="597" y="124" text-anchor="middle" dominant-baseline="central">Cached Response</text>

  <!-- ── Miss path (down → right) ── -->
  <path d="M340 337 L340 390 L478 390" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <text class="elbl" x="400" y="382">Miss</text>

  <!-- ══════════════════════════════════════ -->
  <!-- 4. Acquire Lock (orange diamond)      -->
  <!-- ══════════════════════════════════════ -->
  <g transform="translate(560,390)">
    <polygon points="0,-82 82,0 0,82 -82,0" fill="#FF9800"/>
    <text class="lbl" x="0" y="-10" text-anchor="middle" dominant-baseline="central">Acquire</text>
    <text class="lbl" x="0" y="14" text-anchor="middle" dominant-baseline="central">Lock</text>
  </g>

  <!-- ── Fail path (up-right → right) ── -->
  <path d="M630 330 L660 300 L660 110 L770 110" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <text class="elbl" x="710" y="100">Fail</text>

  <!-- 5. 202 Accepted (red) -->
  <rect x="780" y="72" width="185" height="76" rx="8" fill="#EF5350"/>
  <text class="lbl" x="872" y="114" text-anchor="middle" dominant-baseline="central">202 Accepted</text>

  <!-- ── Success path (down-right) ── -->
  <path d="M630 450 L660 480 L770 480" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <text class="elbl" x="672" y="502">Success</text>

  <!-- ══════════════════════════════════════ -->
  <!-- 6. Execute Business Logic (purple)    -->
  <!-- ══════════════════════════════════════ -->
  <rect x="780" y="442" width="215" height="76" rx="8" fill="#7E57C2"/>
  <text class="lbl" x="887" y="470" text-anchor="middle" dominant-baseline="central">Execute</text>
  <text class="lbl" x="887" y="494" text-anchor="middle" dominant-baseline="central">Business Logic</text>

  <!-- Arrow: Execute → Cache Response -->
  <line x1="995" y1="480" x2="1068" y2="480" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════ -->
  <!-- 7. Cache Response (teal, large)       -->
  <!-- ══════════════════════════════════════ -->
  <rect x="1078" y="430" width="310" height="100" rx="10" fill="#009688"/>
  <text class="lbl" x="1233" y="466" text-anchor="middle" dominant-baseline="central">Cache Response</text>
  <text class="sub" x="1233" y="492" text-anchor="middle" dominant-baseline="central">(PROCESSING → COMPLETED)</text>

  <!-- Arrow: Cache Response → Return -->
  <line x1="1388" y1="480" x2="1408" y2="480" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════ -->
  <!-- 8. Return (green, right edge)         -->
  <!-- ══════════════════════════════════════ -->
  <rect x="1415" y="445" width="85" height="70" rx="8" fill="#4CAF50"/>
  <text class="lbl" x="1457" y="484" text-anchor="middle" dominant-baseline="central">Return</text>

</svg>
