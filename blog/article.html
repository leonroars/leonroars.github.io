<!DOCTYPE html>
<html lang="ko" data-theme="light" data-lang="ko" data-title-ko="아티클 — 채호연" data-title-en="Article — HoYeon Chae">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아티클 — 채호연</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="blog.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <!-- Prevent FOUC -->
  <script>
    (function () {
      var t = localStorage.getItem('portfolio-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      var l = localStorage.getItem('portfolio-lang');
      if (!l) {
        var browserLang = navigator.language || navigator.userLanguage || '';
        l = browserLang.toLowerCase().startsWith('ko') ? 'ko' : 'en';
      }
      document.documentElement.setAttribute('data-lang', l);
    })();
  </script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CFED45WD5V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-CFED45WD5V');
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>

<body>

  <!-- ====== NAVIGATION ====== -->
  <nav class="nav">
    <a href="../index.html" class="nav-logo">
      <span class="lang-ko">채호연</span>
      <span class="lang-en">Julian Chae</span>
    </a>
    <div class="nav-tabs">
      <a href="../index.html" class="nav-tab">
        <span class="lang-ko">소개</span>
        <span class="lang-en">About Me</span>
      </a>
      <a href="index.html" class="nav-tab is-active" aria-current="page">
        <span class="lang-ko">아티클</span>
        <span class="lang-en">Articles</span>
      </a>
    </div>
    <div class="nav-controls">
      <button id="lang-toggle" class="nav-toggle lang-toggle" aria-label="Toggle language">EN</button>
      <button id="theme-toggle" class="nav-toggle" aria-label="Toggle theme">☾</button>
    </div>
  </nav>

  <main class="article-container">
    <a href="index.html" class="article-back">
      <span class="lang-ko">← 모든 아티클</span>
      <span class="lang-en">← All Articles</span>
    </a>

    <article class="article" id="article-root">
      <header class="article-head">
        <div class="article-chips" id="article-chips"></div>
        <h1 class="article-title" id="article-title"></h1>
        <p class="article-meta" id="article-meta"></p>
      </header>

      <div class="article-body" id="article-body"></div>

      <p class="article-fallback-note" id="article-fallback-note" hidden></p>
    </article>

    <div class="article-not-found" id="article-not-found" hidden>
      <p>
        <span class="lang-ko">아티클을 찾을 수 없습니다.</span>
        <span class="lang-en">Article not found.</span>
      </p>
    </div>
  </main>

  <script src="../script.js"></script>
  <script src="blog.js"></script>
</body>

</html>
